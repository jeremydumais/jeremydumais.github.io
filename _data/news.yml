- date: 2025-11-01
  category: Release
  title: C++ SMTP Client Library 1.1.13
  project: C++ SMTP Client Library
  url: https://github.com/jeremydumais/CPP-SMTPClient-library
  summary: Fixes non-transitive OpenSSL include paths on Windows by properly exposing dependency include paths to consumers.
  details:
