- date: 2025-07-23
  category: Release
  title: C++ SMTP Client Library 1.1.11
  project: C++ SMTP Client Library
  url: https://github.com/jeremydumais/CPP-SMTPClient-library
  summary: MIME, logging, and mail-header improvements, plus fixes for multipart delivery and email validation edge cases.
  details:
    - title: New features
      items:
        - Adjust MIME attachment line length to 76 characters, excluding CRLF, to comply with RFC 2045.
        - Add client communication log levels: None, ExcludeAttachmentsBytes, and Full.
        - Add the Date header field to outgoing emails to comply with RFC 2822.
    - title: Bug fixes
      items:
        - Fix ProtonMail Bridge multipart messages by adding the missing closing MIME boundary.
        - Prevent catastrophic backtracking in email address validation.

- date: 2025-07-06
  category: Release
  title: The Warrior 0.3.3
  project: The Warrior
  url: https://github.com/jeremydumais/TheWarrior
  summary: A substantial editor release with persistent toolbar state, zoom, undo/redo, tile tools, and several stability fixes.
  details:
    - title: Map Editor
      items:
        - Move editor configuration into the Jed# Software application folder.
        - Render only visible tiles to reduce CPU usage.
        - Persist toolbar position and visibility.
        - Add grid visibility persistence, Alt + Click map movement, mouse-wheel zoom, undo/redo, picker tool, multi-selection tile edits, bottom map-view tabs, monster-zone controls, and tile copy/paste.
        - Fix several crashes and selection-history issues reported in Issues #6, #9, #13, #14, and #15.
    - title: Item Editor
      items:
        - Move editor configuration into the Jed# Software application folder.
    - title: Monster Editor
      items:
        - Move editor configuration into the Jed# Software application folder.

